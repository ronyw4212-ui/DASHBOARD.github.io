<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Wijaya AC System Ultimate Final</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: Arial; background:#f5f7fb; margin:0; }
.container { padding:20px; }
.cards { display:grid; grid-template-columns: repeat(6,1fr); gap:10px; }
.card, .box { background:white; padding:15px; border-radius:10px; margin-top:10px; }
input, select { width:100%; padding:8px; margin:5px 0; }
button { background:#3498db; color:white; padding:8px; border:none; cursor:pointer; }
table { width:100%; border-collapse:collapse; margin-top:10px; }
th, td { border-bottom:1px solid #eee; padding:8px; }
</style>
</head>

<body>
<div class="container">

<h2>WIJAYA AC SYSTEM 🔥 FINAL</h2>

<button onclick="exportExcel()">Export Excel</button>

<select id="filterBulan" onchange="render()">
<option value="all">Semua Bulan</option>
<option value="0">Jan</option><option value="1">Feb</option>
<option value="2">Mar</option><option value="3">Apr</option>
<option value="4">Mei</option><option value="5">Jun</option>
<option value="6">Jul</option><option value="7">Agu</option>
<option value="8">Sep</option><option value="9">Okt</option>
<option value="10">Nov</option><option value="11">Des</option>
</select>

<div class="cards">
<div class="card"><h4>Omzet</h4><h2 id="omzet">0</h2></div>
<div class="card"><h4>Pengeluaran</h4><h2 id="pengeluaran">0</h2></div>
<div class="card"><h4>Gaji</h4><h2 id="gaji">0</h2></div>
<div class="card"><h4>Profit</h4><h2 id="profit">0</h2></div>
<div class="card"><h4>Saldo Jalan</h4><h2 id="saldoJalan">0</h2></div>
<div class="card"><h4>Valuasi</h4><h2 id="valuasi">0</h2></div>
</div>

<div class="box">
<h3>Grafik</h3>
<canvas id="chart"></canvas>
</div>

<!-- INPUT INVOICE -->
<div class="box">
<h3>Invoice</h3>
<input type="date" id="tgl">
<input type="text" id="nama" placeholder="Customer">

<label>Teknisi</label>
<select multiple id="teknisi">
<option>Roni</option><option>bayu</option><option>triono</option>
</select>

<label>Helper</label>
<select multiple id="helper">
<option>danu</option><option>bani</option><option>nothing</option>
</select>

<input type="number" id="qty" placeholder="Qty">
<input type="number" id="jasa" placeholder="Harga Jasa">
<input type="number" id="material" placeholder="Harga Material">

<button onclick="addInv()">Simpan</button>
</div>

<!-- PENGELUARAN -->
<div class="box">
<h3>Pengeluaran</h3>
<input type="date" id="exp_tgl">
<input type="text" id="exp_nama">
<input type="number" id="exp_jumlah">
<button onclick="addExp()">Tambah</button>
</div>

<!-- KASBON -->
<div class="box">
<h3>Kasbon</h3>
<select id="kas_nama">
<option>Roni</option><option>Budi</option><option>Andi</option>
</select>
<input type="number" id="kas_jumlah">
<button onclick="addKas()">Tambah</button>
</div>

<div class="box"><h3>Laporan Gaji</h3><div id="lapGaji"></div></div>
<div class="box"><h3>Invoice</h3><div id="invTable"></div></div>
<div class="box"><h3>Pengeluaran</h3><div id="expTable"></div></div>
<div class="box"><h3>Jurnal</h3><div id="jurnal"></div></div>

</div>

<script>
let inv = JSON.parse(localStorage.getItem("inv")) || [];
let exp = JSON.parse(localStorage.getItem("exp")) || [];
let kas = JSON.parse(localStorage.getItem("kas")) || [];
let chart;

const tPersen = 0.25;
const hPersen = 0.07;

function getMulti(id){
return Array.from(document.getElementById(id).selectedOptions).map(o=>o.value);
}

// ADD DATA
function addInv(){
let t = document.getElementById("tgl").value;
let n = document.getElementById("nama").value;
let teknisi = getMulti("teknisi");
let helper = getMulti("helper");
let qty = +document.getElementById("qty").value;
let jasa = +document.getElementById("jasa").value * qty;
let material = +document.getElementById("material").value * qty;

if(!t||!n||!qty||teknisi.length==0||helper.length==0){
alert("Lengkapi data"); return;
}

let total = jasa + material;
let gajiT = (jasa * tPersen)/teknisi.length;
let gajiH = (jasa * hPersen)/helper.length;

inv.push({t,n,teknisi,helper,jasa,material,total,gajiT,gajiH});
localStorage.setItem("inv",JSON.stringify(inv));
render();
}

function addExp(){
let t = document.getElementById("exp_tgl").value;
let n = document.getElementById("exp_nama").value;
let j = +document.getElementById("exp_jumlah").value;

if(!t||!n||!j){ alert("Isi pengeluaran"); return; }

exp.push({t,n,j});
localStorage.setItem("exp",JSON.stringify(exp));
render();
}

function addKas(){
let n = document.getElementById("kas_nama").value;
let j = +document.getElementById("kas_jumlah").value;

if(!j){ alert("Isi kasbon"); return; }

kas.push({n,j,t:new Date().toISOString().slice(0,10)});
localStorage.setItem("kas",JSON.stringify(kas));
render();
}

// DELETE
function delInv(i){ inv.splice(i,1); localStorage.setItem("inv",JSON.stringify(inv)); render(); }
function delExp(i){ exp.splice(i,1); localStorage.setItem("exp",JSON.stringify(exp)); render(); }

// RENDER
function render(){

let bulan = document.getElementById("filterBulan").value;

let omzet=0,gaji=0,pengeluaran=0;
let jasaT=0,materialT=0;
let gajiOrang={},kasOrang={};
let saldo=0;
let jurnal=[];

// kasbon
kas.forEach(k=>{
kasOrang[k.n]=(kasOrang[k.n]||0)+k.j;
jurnal.push({t:k.t,ket:"Kasbon "+k.n,m:0,k:k.j});
});

// invoice
let htmlInv="<table><tr><th>Tgl</th><th>Nama</th><th>Teknisi</th><th>Helper</th><th>Total</th><th>Aksi</th></tr>";

inv.forEach((d,i)=>{
let tgl=new Date(d.t);

if(bulan==="all"||tgl.getMonth()==bulan){

omzet+=d.total;
jasaT+=d.jasa;
materialT+=d.material;

d.teknisi.forEach(x=>{
gaji+=d.gajiT;
gajiOrang[x]=(gajiOrang[x]||0)+d.gajiT;
});
d.helper.forEach(x=>{
gaji+=d.gajiH;
gajiOrang[x]=(gajiOrang[x]||0)+d.gajiH;
});

htmlInv+=`<tr>
<td>${d.t}</td>
<td>${d.n}</td>
<td>${d.teknisi.join(",")}</td>
<td>${d.helper.join(",")}</td>
<td>Rp ${d.total.toLocaleString()}</td>
<td><button onclick="delInv(${i})">Hapus</button></td>
</tr>`;

jurnal.push({t:d.t,ket:"Pendapatan",m:d.total,k:0});
jurnal.push({t:d.t,ket:"Gaji",m:0,k:(d.gajiT+d.gajiH)});
}
});
htmlInv+="</table>";
document.getElementById("invTable").innerHTML=htmlInv;

// pengeluaran
let htmlExp="<table><tr><th>Tgl</th><th>Nama</th><th>Jumlah</th><th>Aksi</th></tr>";

exp.forEach((e,i)=>{
let tgl=new Date(e.t);

if(bulan==="all"||tgl.getMonth()==bulan){
pengeluaran+=e.j;

htmlExp+=`<tr>
<td>${e.t}</td>
<td>${e.n}</td>
<td>Rp ${e.j.toLocaleString()}</td>
<td><button onclick="delExp(${i})">Hapus</button></td>
</tr>`;

jurnal.push({t:e.t,ket:e.n,m:0,k:e.j});
}
});
htmlExp+="</table>";
document.getElementById("expTable").innerHTML=htmlExp;

// KPI
let fix=0;
let profit=omzet-(gaji+pengeluaran+fix);
let valuasi=profit*36;

document.getElementById("omzet").innerText="Rp "+omzet.toLocaleString();
document.getElementById("pengeluaran").innerText="Rp "+(pengeluaran+fix).toLocaleString();
document.getElementById("gaji").innerText="Rp "+gaji.toLocaleString();
document.getElementById("profit").innerText="Rp "+profit.toLocaleString();
document.getElementById("valuasi").innerText="Rp "+valuasi.toLocaleString();

// laporan gaji
let gajiHTML="<table><tr><th>Nama</th><th>Gaji</th><th>Kasbon</th><th>Sisa</th></tr>";
for(let n in gajiOrang){
let kasbon=kasOrang[n]||0;
let sisa=gajiOrang[n]-kasbon;

gajiHTML+=`<tr>
<td>${n}</td>
<td>Rp ${gajiOrang[n].toLocaleString()}</td>
<td>Rp ${kasbon.toLocaleString()}</td>
<td>Rp ${sisa.toLocaleString()}</td>
</tr>`;
}
gajiHTML+="</table>";
document.getElementById("lapGaji").innerHTML=gajiHTML;

// jurnal
jurnal.sort((a,b)=> new Date(a.t)-new Date(b.t));

let jHTML="<table><tr><th>Tgl</th><th>Ket</th><th>Masuk</th><th>Keluar</th><th>Saldo</th></tr>";

jurnal.forEach(j=>{
saldo+=j.m-j.k;
jHTML+=`<tr>
<td>${j.t}</td>
<td>${j.ket}</td>
<td>${j.m? "Rp "+j.m.toLocaleString():"-"}</td>
<td>${j.k? "Rp "+j.k.toLocaleString():"-"}</td>
<td>Rp ${saldo.toLocaleString()}</td>
</tr>`;
});

jHTML+="</table>";
document.getElementById("jurnal").innerHTML=jHTML;
document.getElementById("saldoJalan").innerText="Rp "+saldo.toLocaleString();

// chart
if(chart) chart.destroy();
chart=new Chart(document.getElementById("chart"),{
type:'bar',
data:{
labels:["Jasa","Material"],
datasets:[{label:"Pendapatan",data:[jasaT,materialT]}]
}
});
}

// EXPORT EXCEL
function exportExcel(){

let bulan=document.getElementById("filterBulan").value;

let wb=XLSX.utils.book_new();

// ===== INVOICE =====
let invData=[["Tanggal","Customer","Teknisi","Helper","Jasa","Material","Total"]];
inv.forEach(d=>{
let tgl=new Date(d.t);
if(bulan==="all"||tgl.getMonth()==bulan){
invData.push([d.t,d.n,d.teknisi.join(","),d.helper.join(","),d.jasa,d.material,d.total]);
}
});
XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(invData),"Invoice");

// ===== EXPENSE =====
let expData=[["Tanggal","Keterangan","Jumlah"]];
exp.forEach(e=>{
let tgl=new Date(e.t);
if(bulan==="all"||tgl.getMonth()==bulan){
expData.push([e.t,e.n,e.j]);
}
});
XLSX.utils.book_append_sheet(wb,XLSX.utils.aoa_to_sheet(expData),"Pengeluaran");

// ===== SAVE =====
XLSX.writeFile(wb,"Laporan_Wijaya_AC.xlsx");

}

render();
</script>

</body>
</html>
